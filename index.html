<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thu thập thông tin nhân sự</title>
<style>
  :root{
    --navy:#122b4d; --navy-2:#1c3f6e; --gold:#b8862c; --paper:#f6f4ef;
    --ink:#1c2430; --line:#d8d3c6; --ok:#1f7a4d; --warn:#b3441c; --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:60px;}
  header{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-2) 100%);color:#fff;
    padding:22px 16px 26px;text-align:center;border-bottom:3px solid var(--gold);}
  header h1{margin:0 0 4px;font-size:18px;letter-spacing:.3px;font-weight:700;}
  header p{margin:0;font-size:12.5px;opacity:.85;}
  .wrap{max-width:640px;margin:-14px auto 0;padding:0 14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:18px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--navy-2);
    margin:0 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:8px;}
  .card h2 .n{background:var(--navy);color:#fff;width:20px;height:20px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
  label{display:block;font-size:12.5px;font-weight:600;margin:0 0 5px;color:#3c4756;}
  .req::after{content:" *";color:var(--warn);}
  input[type=text],input[type=tel],input[type=date],select,textarea{
    width:100%;padding:10px 11px;border:1px solid #c7c1b2;border-radius:7px;
    font-size:15px;background:#fff;color:#000;font-family:inherit;font-weight:700;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--navy-2);outline-offset:1px;}
  .row{margin-bottom:13px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .hint{font-size:11px;color:#7a7566;margin-top:4px;}
  .err{font-size:11.5px;color:var(--warn);margin-top:4px;display:none;}
  .row.invalid input,.row.invalid select{border-color:var(--warn);}
  .row.invalid .err{display:block;}
  .photobox{border:1.5px dashed #c7c1b2;border-radius:10px;padding:14px;text-align:center;position:relative;}
  .photobox.done{border-style:solid;border-color:var(--ok);}
  .photobox.bad{border-style:solid;border-color:var(--warn);}
  .pb-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
  .pb-sub{font-size:11.5px;color:#7a7566;margin-bottom:10px;}
  .thumb{max-width:100%;max-height:180px;border-radius:6px;display:block;margin:0 auto 10px;}
  .btnrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  button{font-family:inherit;cursor:pointer;}
  .btn{border:none;border-radius:7px;padding:10px 16px;font-size:13.5px;font-weight:600;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:disabled{background:#9aa5b4;cursor:not-allowed;}
  .btn-outline{background:#fff;border:1px solid #c7c1b2;color:var(--ink);}
  .btn-gold{background:var(--gold);color:#fff;}
  .btn-sm{padding:6px 11px;font-size:12px;}
  .checklist{margin-top:10px;text-align:left;font-size:12px;background:#faf9f5;border-radius:7px;padding:9px 11px;}
  .checklist div{padding:2px 0;display:flex;gap:6px;align-items:flex-start;}
  .checklist .ok{color:var(--ok);}
  .checklist .bad{color:var(--warn);}
  .checklist .soft{color:#966b1f;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:6px;}
  .submitbar{position:sticky;bottom:0;background:var(--paper);padding:10px 0 4px;}
  .submitbtn{width:100%;padding:14px;font-size:15px;border-radius:9px;}
  .banner{padding:11px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;}
  .banner.ok{background:#e5f4ec;color:var(--ok);border:1px solid #b9e0c8;}
  .banner.warn{background:#fbeae2;color:var(--warn);border:1px solid #f0c4ae;}
  .camwrap{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;}
  .camwrap video{flex:1;width:100%;object-fit:cover;background:#000;}
  .guide{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
  .guide .frame{border:3px solid #ffd966;border-radius:10px;box-shadow:0 0 0 999px rgba(0,0,0,.45);}
  .camctrl{background:#000;padding:14px 16px 22px;display:flex;align-items:center;justify-content:space-between;}
  .shutter{width:64px;height:64px;border-radius:50%;background:#fff;border:4px solid #ccc;}
  .camtext{position:absolute;top:14px;left:0;right:0;text-align:center;color:#fff;font-size:12.5px;padding:0 20px;}
  .cfgwarn{background:#3a2413;color:#ffd9a8;font-size:11.5px;text-align:center;padding:7px 10px;}
  @media (max-width:380px){
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>

/* Chặn màn hình nếu mở trong webview của Zalo/Messenger/Facebook/Instagram/Line,
   vì các webview này thường không cấp quyền camera. Hướng dẫn riêng cho Android/iPhone. */
(function checkInAppBrowser(){
  const ua = navigator.userAgent || '';
  const appMatch = ua.match(/Zalo|FBAN|FBAV|FB_IAB|Instagram|Line\//i);
  if (!appMatch) return;

  const appName = /Zalo/i.test(ua) ? 'Zalo'
    : /Instagram/i.test(ua) ? 'Instagram'
    : /Line\//i.test(ua) ? 'Line'
    : 'Messenger/Facebook';

  const isAndroid = /Android/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const targetBrowser = isIOS ? 'Safari' : 'Chrome';

  const steps = isIOS
    ? [
        'Bấm biểu tượng <b>chia sẻ ⬆</b> hoặc <b>•••</b> ở góc trên/dưới màn hình trong ' + appName,
        'Chọn <b>"Mở trong Safari"</b> (Open in Safari)',
        'Trang sẽ mở trong Safari, chụp ảnh bình thường'
      ]
    : [
        'Bấm biểu tượng <b>⋮ (ba chấm)</b> góc trên phải trong ' + appName,
        'Chọn <b>"Mở bằng Chrome"</b> hoặc <b>"Open in Chrome"</b>',
        'Trang sẽ mở trong Chrome, chụp ảnh bình thường'
      ];

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="max-width:380px;text-align:center;font-family:inherit;">
      <div style="font-size:52px;margin-bottom:14px;">📷</div>
      <h2 style="color:var(--navy);font-size:20px;margin:0 0 10px;">Mở bằng ${targetBrowser} để chụp ảnh</h2>
      <p style="color:#5b6472;font-size:14px;line-height:1.5;margin:0 0 18px;">
        Trình duyệt trong <b>${appName}</b> thường không cho phép dùng camera.
        Vui lòng mở bằng <b>${targetBrowser}</b> để chụp và nộp ảnh được.
      </p>
      <div style="background:#f2f1eb;border-radius:12px;padding:14px 16px;text-align:left;margin-bottom:18px;">
        ${steps.map((s,i)=>`
          <div style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;font-size:13.5px;color:var(--ink);">
            <span style="flex:0 0 22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${i+1}</span>
            <span>${s}</span>
          </div>`).join('')}
      </div>
      <button id="forceOpenBtn" style="width:100%;padding:14px;border:none;border-radius:10px;background:var(--navy);color:var(--gold);font-weight:700;font-size:14.5px;margin-bottom:12px;">✅ Đã hiểu, mở bằng ${targetBrowser}</button>
      <div id="skipInApp" style="font-size:12.5px;color:#9a94a0;text-decoration:underline;cursor:pointer;">Bỏ qua, tiếp tục xem (có thể không chụp được ảnh)</div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('skipInApp').onclick = ()=> overlay.remove();
  document.getElementById('forceOpenBtn').onclick = ()=>{
    const url = window.location.href;
    if (isAndroid){
      // Thử mở thẳng bằng Chrome qua Android intent (hoạt động trên phần lớn máy Android)
      const stripped = url.replace(/^https?:\/\//,'');
      window.location.href = 'intent://' + stripped + '#Intent;scheme=https;package=com.android.chrome;end';
    } else {
      // iOS không cho ép mở Safari từ trong webview khác -> copy link để người dùng tự dán
      if (navigator.clipboard){ navigator.clipboard.writeText(url).catch(()=>{}); }
      alert('Đã copy link. Vui lòng mở Safari và dán link vào để tiếp tục.');
    }
  };
})();



/* ---------------- state ---------------- */
const state = {
  fields: {
    mnv:'', hoten:'', gioitinh:'',
    ngaysinh:'', ngaysinh_d:'', ngaysinh_m:'', ngaysinh_y:'',
    ngaybatdau:'', ngaybatdau_d:'', ngaybatdau_m:'', ngaybatdau_y:'',
    quoctich:'Việt Nam', quoctich_khac:'',
    chucdanh:'', giayto:'',
    ngaycap:'', ngaycap_d:'', ngaycap_m:'', ngaycap_y:'',
    noicap:'Cục Cảnh sát QLHC về TTXH',
    dienthoai:'', faceid:'', thetam:'',
    vitri:'', mangktx:'',
    ngaydangkyktx:'', ngaydangkyktx_d:'', ngaydangkyktx_m:'', ngaydangkyktx_y:''
  },
  photos: { chandung:null, cccd_truoc:null, cccd_sau:null }
};
const PHOTO_META = {
  chandung:  {title:'Ảnh chân dung', sub:'Chụp thẳng mặt, đủ sáng, không đội mũ / đeo kính râm', aspect:0.78, orient:'portrait', minW:400,minH:500},
  cccd_truoc:{title:'CCCD - Mặt trước', sub:'Đặt thẻ nằm ngang, lấy đủ 4 góc, tránh chói sáng', aspect:1.586, orient:'landscape', minW:600,minH:378},
  cccd_sau:  {title:'CCCD - Mặt sau', sub:'Đặt thẻ nằm ngang, lấy đủ 4 góc, tránh chói sáng', aspect:1.586, orient:'landscape', minW:600,minH:378},
};
const KTX_NO_DATE = ['Tự thuê ngoài','Nhà cá nhân'];
let mode = 'form';

/* ---------------- image analysis ---------------- */
function analyzeCanvas(canvas, meta){
  const w = canvas.width, h = canvas.height;
  const hard = [];   // chỉ chặn khi ảnh thật sự hỏng/quá nhỏ bất thường
  const soft = [];   // mọi nghi ngờ khác -> chỉ cảnh báo, KHÔNG chặn gửi

  if (w < 200 || h < 200){
    hard.push('Ảnh quá nhỏ hoặc bị lỗi, vui lòng chụp/chọn lại ảnh khác.');
  } else if (w < meta.minW || h < meta.minH){
    soft.push('Độ phân giải hơi thấp so với khuyến nghị, nếu ảnh vẫn rõ chữ/rõ mặt thì vẫn nộp được.');
  }

  const ratio = w/h;
  if (meta.orient === 'landscape' && ratio < 0.85){
    soft.push('Ảnh có vẻ đang bị dọc — nếu chụp CCCD nên xoay ngang để dễ nhìn hơn.');
  } else if (meta.orient === 'portrait' && ratio > 1.15){
    soft.push('Ảnh có vẻ đang bị ngang — ảnh chân dung nên chụp theo chiều dọc.');
  }

  const sw = 400, sh = Math.max(1, Math.round(400*h/w));
  const tmp = document.createElement('canvas'); tmp.width=sw; tmp.height=sh;
  const tctx = tmp.getContext('2d'); tctx.drawImage(canvas,0,0,sw,sh);
  const data = tctx.getImageData(0,0,sw,sh).data;
  const gray = new Float32Array(sw*sh);
  let sum=0;
  for (let i=0,p=0;i<data.length;i+=4,p++){
    const g = 0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
    gray[p]=g; sum+=g;
  }
  const brightness = sum/gray.length;
  if (brightness < 65) soft.push('Ảnh hơi tối, kiểm tra xem còn đọc rõ chữ/thấy rõ mặt không.');
  if (brightness > 210) soft.push('Ảnh hơi chói, kiểm tra chữ trên thẻ còn đọc được không.');

  let lapSum=0, lapSumSq=0, cnt=0;
  for (let y=1;y<sh-1;y++){
    for (let x=1;x<sw-1;x++){
      const idx = y*sw+x;
      const lap = gray[idx-1]+gray[idx+1]+gray[idx-sw]+gray[idx+sw]-4*gray[idx];
      lapSum += lap; lapSumSq += lap*lap; cnt++;
    }
  }
  const mean = lapSum/cnt;
  const variance = (lapSumSq/cnt) - mean*mean;
  if (variance < 35) soft.push('Ảnh có thể hơi mờ — nếu phóng to vẫn đọc rõ số/chữ thì vẫn nộp được.');

  return { width:w, height:h, brightness, sharpness:variance, hard, soft, pass: hard.length===0 };
}
function resizeCompress(canvas, maxDim, quality){
  let {width:w, height:h} = canvas;
  if (Math.max(w,h) > maxDim){
    const scale = maxDim/Math.max(w,h);
    const c2 = document.createElement('canvas');
    c2.width = Math.round(w*scale); c2.height = Math.round(h*scale);
    c2.getContext('2d').drawImage(canvas,0,0,c2.width,c2.height);
    return c2.toDataURL('image/jpeg', quality);
  }
  return canvas.toDataURL('image/jpeg', quality);
}

/* ---------------- camera capture ---------------- */
let currentStream = null;
function openCamera(key){
  const meta = PHOTO_META[key];
  const wrap = document.createElement('div');
  wrap.className = 'camwrap';
  wrap.innerHTML = `
    <div class="camtext">${meta.title} — căn vừa khung vàng</div>
    <video autoplay playsinline muted></video>
    <div class="guide"><div class="frame" style="${meta.orient==='portrait' ? 'width:62vw;height:'+(62*1/meta.aspect)+'vw;border-radius:16px;' : 'width:86vw;height:'+(86/meta.aspect)+'vw;border-radius:10px;'}"></div></div>
    <div class="camctrl">
      <button class="btn btn-outline btn-sm" id="camCancel">Hủy</button>
      <button class="shutter" id="camShot"></button>
      <button class="btn btn-outline btn-sm" id="camFlip">Đổi camera</button>
    </div>`;
  document.body.appendChild(wrap);
  const video = wrap.querySelector('video');
  let useFacing = 'environment';
  async function start(){
    if (currentStream) currentStream.getTracks().forEach(t=>t.stop());
    try{
      currentStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:useFacing}, audio:false});
      video.srcObject = currentStream;
    }catch(e){
      alert('Không truy cập được camera. Vui lòng cho phép quyền camera hoặc dùng nút "Chọn ảnh có sẵn".');
      close();
    }
  }
  function close(){
    if (currentStream){ currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
    wrap.remove();
  }
  wrap.querySelector('#camCancel').onclick = close;
  wrap.querySelector('#camFlip').onclick = ()=>{ useFacing = useFacing==='environment' ? 'user' : 'environment'; start(); };
  wrap.querySelector('#camShot').onclick = ()=>{
    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d').drawImage(video,0,0);
    close();
    handleCapturedCanvas(key, c);
  };
  start();
}
function pickFile(key){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = ()=>{
    const f = inp.files[0]; if(!f) return;
    const img = new Image();
    img.onload = ()=>{
      const c = document.createElement('canvas'); c.width=img.width; c.height=img.height;
      c.getContext('2d').drawImage(img,0,0);
      handleCapturedCanvas(key,c);
    };
    img.src = URL.createObjectURL(f);
  };
  inp.click();
}
function handleCapturedCanvas(key, canvas){
  const meta = PHOTO_META[key];
  const analysis = analyzeCanvas(canvas, meta);
  const dataUrl = resizeCompress(canvas, 1000, 0.82);
  state.photos[key] = { dataUrl, analysis, overridden:false };
  render();
}
function toggleOverride(key,val){ state.photos[key].overridden = val; render(); }

/* ---------------- validation ---------------- */
function fieldErrors(){
  const f = state.fields; const e = {};
  if (!f.mnv.trim()) e.mnv = 'Bắt buộc nhập MNV.';
  if (!f.hoten.trim()) e.hoten = 'Bắt buộc nhập họ tên.';
  if (!f.gioitinh) e.gioitinh = 'Bắt buộc chọn giới tính.';
  if (!f.ngaysinh) e.ngaysinh = 'Bắt buộc chọn ngày sinh.';
  if (!f.ngaybatdau) e.ngaybatdau = 'Bắt buộc chọn ngày bắt đầu làm việc.';
  if (f.quoctich==='Khác' && !f.quoctich_khac.trim()) e.quoctich_khac = 'Nhập tên quốc tịch.';
  if (!f.chucdanh.trim()) e.chucdanh = 'Bắt buộc nhập chức danh.';
  if (!f.giayto.trim()) e.giayto = 'Bắt buộc nhập số CMT/CCCD/Hộ chiếu.';
  if (!f.ngaycap) e.ngaycap = 'Bắt buộc chọn ngày cấp.';
  if (!/^0\d{9}$/.test(f.dienthoai.trim())) e.dienthoai = 'Số điện thoại VN gồm 10 số, bắt đầu bằng 0.';
  if (!f.faceid) e.faceid = 'Bắt buộc chọn.';
  if (!f.thetam) e.thetam = 'Bắt buộc chọn.';
  if (!f.vitri) e.vitri = 'Bắt buộc chọn vị trí làm việc.';
  if (!f.mangktx) e.mangktx = 'Bắt buộc chọn vị trí ở hiện tại.';
  if (f.mangktx && !KTX_NO_DATE.includes(f.mangktx) && !f.ngaydangkyktx) e.ngaydangkyktx = 'Bắt buộc chọn ngày đăng ký ở.';
  return e;
}

/* ---------------- render helpers ---------------- */
function fieldRow(id,labelText,type,opts={}){
  const val = state.fields[id];
  const errs = window.__errs || {};
  const invalid = errs[id] ? 'invalid':'';
  let inputHtml;
  if (type==='select'){
    const placeholderOpt = opts.placeholder ? `<option value="" ${!val?'selected':''} disabled hidden>${opts.placeholder}</option>` : '';
    inputHtml = `<select data-f="${id}">${placeholderOpt}${opts.options.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join('')}</select>`;
  } else {
    inputHtml = `<input type="${type}" data-f="${id}" value="${(val||'').toString().replace(/"/g,'&quot;')}" ${opts.placeholder?`placeholder="${opts.placeholder}"`:''}>`;
  }
  return `<div class="row ${invalid}">
    <label class="${opts.required?'req':''}">${labelText}</label>
    ${inputHtml}
    ${opts.hint?`<div class="hint">${opts.hint}</div>`:''}
    <div class="err">${errs[id]||''}</div>
  </div>`;
}
function dateSelectRow(id, labelText, opts={}){
  const errs = window.__errs || {};
  const invalid = errs[id] ? 'invalid' : '';
  const dVal = state.fields[id+'_d'] || '';
  const mVal = state.fields[id+'_m'] || '';
  const yVal = state.fields[id+'_y'] || '';
  const minY = opts.minYear || 1950;
  const maxY = opts.maxYear || (new Date().getFullYear()+1);
  let yearOpts = '';
  for (let y=maxY; y>=minY; y--) yearOpts += `<option value="${y}" ${String(y)===yVal?'selected':''}>${y}</option>`;
  let dayOpts = '';
  for (let d=1; d<=31; d++) dayOpts += `<option value="${d}" ${String(d)===dVal?'selected':''}>${d}</option>`;
  let monthOpts = '';
  for (let m=1; m<=12; m++) monthOpts += `<option value="${m}" ${String(m)===mVal?'selected':''}>Tháng ${m}</option>`;
  return `<div class="row ${invalid}">
    <label class="${opts.required?'req':''}">${labelText}</label>
    <div class="row3">
      <select data-datef="${id}" data-part="d"><option value="">Ngày</option>${dayOpts}</select>
      <select data-datef="${id}" data-part="m"><option value="">Tháng</option>${monthOpts}</select>
      <select data-datef="${id}" data-part="y"><option value="">Năm</option>${yearOpts}</select>
    </div>
    <div class="err">${errs[id]||''}</div>
  </div>`;
}
function photoBoxHtml(key){
  const meta = PHOTO_META[key];
  const p = state.photos[key];
  const useNativeOnly = key !== 'chandung'; // CCCD dùng thẳng camera gốc của máy, không dùng camera dựng trong trang
  let cls='photobox', body;
  if (!p){
    body = `<div class="pb-title">${meta.title}</div><div class="pb-sub">${meta.sub}</div>
      <div class="btnrow">
        ${useNativeOnly
          ? `<button class="btn btn-gold btn-sm" onclick="pickFile('${key}')">📷 Chụp / Chọn ảnh</button>`
          : `<button class="btn btn-gold btn-sm" onclick="openCamera('${key}')">📷 Chụp ảnh</button>
             <button class="btn btn-outline btn-sm" onclick="pickFile('${key}')">Chọn ảnh có sẵn</button>`
        }
      </div>`;
  } else {
    cls += p.analysis.pass || p.overridden ? ' done' : ' bad';
    const rows = [];
    if (p.analysis.hard.length===0 && p.analysis.soft.length===0){
      rows.push(`<div class="ok">✓ Ảnh đạt yêu cầu về độ nét, ánh sáng và bố cục.</div>`);
    } else {
      p.analysis.hard.forEach(i=>rows.push(`<div class="bad">✗ ${i}</div>`));
      p.analysis.soft.forEach(i=>rows.push(`<div class="soft">⚠ ${i}</div>`));
    }
    const list = `<div class="checklist">${rows.join('')}</div>`;
    body = `<div class="pb-title">${meta.title}</div>
      <img class="thumb" src="${p.dataUrl}">
      ${list}
      ${(!p.analysis.pass) ? `<label style="display:flex;gap:6px;align-items:center;font-weight:400;font-size:12px;margin-top:8px;justify-content:center;">
          <input type="checkbox" ${p.overridden?'checked':''} onchange="toggleOverride('${key}', this.checked)"> Ảnh thực tế vẫn ổn, vẫn dùng ảnh này
        </label>` : ''}
      <div class="btnrow" style="margin-top:10px;">
        ${useNativeOnly
          ? `<button class="btn btn-outline btn-sm" onclick="pickFile('${key}')">Chụp / chọn ảnh khác</button>`
          : `<button class="btn btn-outline btn-sm" onclick="openCamera('${key}')">Chụp lại</button>
             <button class="btn btn-outline btn-sm" onclick="pickFile('${key}')">Chọn ảnh khác</button>`
        }
      </div>`;
  }
  return `<div class="${cls}">${body}</div>`;
}

/* ---------------- submit ---------------- */
async function submitForm(){
  const errs = fieldErrors();
  window.__errs = errs;
  const missingPhotos = Object.keys(PHOTO_META).filter(k=>!state.photos[k]);
  const blockedPhotos = Object.keys(PHOTO_META).filter(k=>state.photos[k] && !state.photos[k].analysis.pass && !state.photos[k].overridden);

  if (Object.keys(errs).length || missingPhotos.length || blockedPhotos.length){
    render();
    let msg = [];
    if (Object.keys(errs).length) msg.push('Vui lòng kiểm tra lại các ô thông tin còn thiếu/sai (đã bôi đỏ bên dưới).');
    if (missingPhotos.length) msg.push('Vui lòng chụp đủ 3 ảnh.');
    if (blockedPhotos.length) msg.push('Có ảnh chưa đạt (' + blockedPhotos.length + ' ảnh) — chụp lại hoặc tick "vẫn dùng ảnh này" ở đúng ảnh đó.');
    const full = msg.join(' ');
    document.getElementById('topbanner').innerHTML = `<div class="banner warn">⚠ CHƯA GỬI ĐƯỢC: ${full}</div>`;
    window.scrollTo(0,0);
    alert('Chưa gửi được:\n' + full);
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Đang gửi...';

  const f = state.fields;
  const payload = {
    mnv:f.mnv, hoten:f.hoten, gioitinh:f.gioitinh, ngaysinh:f.ngaysinh, ngaybatdau:f.ngaybatdau,
    quoctich: f.quoctich==='Khác' ? f.quoctich_khac : f.quoctich,
    chucdanh:f.chucdanh, giayto:f.giayto, ngaycap:f.ngaycap, noicap:f.noicap,
    dienthoai:f.dienthoai, faceid:f.faceid, thetam:f.thetam,
    vitri:f.vitri, mangktx:f.mangktx,
    ngaydangkyktx: KTX_NO_DATE.includes(f.mangktx) ? '' : f.ngaydangkyktx,
    photos: {
      chandung: state.photos.chandung.dataUrl,
      cccd_truoc: state.photos.cccd_truoc.dataUrl,
      cccd_sau: state.photos.cccd_sau.dataUrl,
    },
    submittedAt: new Date().toISOString()
  };

  try{
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    mode='done';
    setTimeout(()=>alert('✓ Đã gửi thành công! Thông tin đã được lưu.'), 100);
  }catch(e){
    document.getElementById('topbanner').innerHTML = `<div class="banner warn">⚠ GỬI THẤT BẠI thật sự (mất kết nối mạng). Chi tiết: ${e.message}</div>`;
    window.scrollTo(0,0);
    alert('Gửi thất bại: ' + e.message);
    btn.disabled=false; btn.textContent='Gửi thông tin';
    return;
  }
  render();
}
function resetForm(){
  state.fields = {
    mnv:'', hoten:'', gioitinh:'',
    ngaysinh:'', ngaysinh_d:'', ngaysinh_m:'', ngaysinh_y:'',
    ngaybatdau:'', ngaybatdau_d:'', ngaybatdau_m:'', ngaybatdau_y:'',
    quoctich:'Việt Nam', quoctich_khac:'',
    chucdanh:'', giayto:'',
    ngaycap:'', ngaycap_d:'', ngaycap_m:'', ngaycap_y:'',
    noicap:'Cục Cảnh sát QLHC về TTXH',
    dienthoai:'', faceid:'', thetam:'',
    vitri:'', mangktx:'',
    ngaydangkyktx:'', ngaydangkyktx_d:'', ngaydangkyktx_m:'', ngaydangkyktx_y:''
  };
  state.photos = { chandung:null, cccd_truoc:null, cccd_sau:null };
  window.__errs = {};
  mode='form';
  render();
}

/* ---------------- main render ---------------- */
function render(){
  const app = document.getElementById('app');
  if (mode==='done'){
    app.innerHTML = `<div class="card" style="text-align:center;">
      <h2 style="border:none;justify-content:center;">✓ Đã gửi thành công</h2>
      <p>Thông tin của <b>${state.fields.hoten}</b> đã được ghi nhận.</p>
      <button class="btn btn-primary" onclick="resetForm()">Nộp cho người tiếp theo</button>
    </div>`;
    return;
  }
  const showKtxDate = !KTX_NO_DATE.includes(state.fields.mangktx);
  app.innerHTML = `
    <div id="topbanner"></div>
    <div class="card">
      <h2><span class="n">1</span> Thông tin cá nhân</h2>
      ${fieldRow('mnv','MNV','text',{required:true,placeholder:'VD: 4013367'})}
      ${fieldRow('hoten','Họ và tên','text',{required:true,placeholder:'VD: Nguyễn Văn A'})}
      ${fieldRow('gioitinh','Giới tính','select',{options:['Nam','Nữ'],required:true,placeholder:'-- Chọn giới tính --'})}
      ${dateSelectRow('ngaysinh','Ngày/tháng/năm sinh',{required:true,minYear:1955,maxYear:new Date().getFullYear()-15})}
      ${dateSelectRow('ngaybatdau','Ngày bắt đầu làm việc tại dự án',{required:true,minYear:2015,maxYear:new Date().getFullYear()+1})}
      ${fieldRow('quoctich','Quốc tịch','select',{options:['Việt Nam','Lào','Campuchia','Trung Quốc','Hàn Quốc','Nhật Bản','Khác'],required:true})}
      ${state.fields.quoctich==='Khác' ? fieldRow('quoctich_khac','Ghi rõ quốc tịch','text',{required:true}) : ''}
      ${fieldRow('chucdanh','Chức danh','text',{required:true,placeholder:'VD: Kỹ sư thi công'})}
    </div>

    <div class="card">
      <h2><span class="n">2</span> Giấy tờ tùy thân</h2>
      ${fieldRow('giayto','Số CMT/CCCD/Hộ chiếu','text',{required:true,placeholder:'Nhập số giấy tờ'})}
      ${dateSelectRow('ngaycap','Ngày cấp',{required:true,minYear:1990,maxYear:new Date().getFullYear()})}
      ${fieldRow('noicap','Nơi cấp','select',{options:['Cục Cảnh sát QLHC về TTXH','Công an tỉnh/thành phố nơi thường trú','Khác'],required:true})}
      ${fieldRow('dienthoai','Số điện thoại','tel',{required:true,placeholder:'VD: 0972...'})}
    </div>

    <div class="card">
      <h2><span class="n">3</span> Ra vào cổng & nơi làm việc</h2>
      <div class="row2">
        ${fieldRow('faceid','Đã có Face ID ra vào cổng?','select',{options:['Có','Chưa có'],required:true,placeholder:'-- Chọn --'})}
        ${fieldRow('thetam','Đã có thẻ tạm ra vào cổng?','select',{options:['Có','Chưa có'],required:true,placeholder:'-- Chọn --'})}
      </div>
      ${fieldRow('vitri','Vị trí làm việc','select',{options:['PK01','PK02','PK03','NOXH','Kênh Thủy Triều','Văn phòng BCH'],required:true,placeholder:'-- Chọn vị trí làm việc --'})}
      ${fieldRow('mangktx','Vị trí ở hiện tại','select',{options:['P9','P11','Lán trại','Nhà thuê (Bà Quyên)','Nhà thuê (Ông Năm)','Tự thuê ngoài','Nhà cá nhân'],required:true,placeholder:'-- Chọn vị trí ở hiện tại --'})}
      ${showKtxDate ? dateSelectRow('ngaydangkyktx','Ngày đăng ký ở',{required:true,minYear:2015,maxYear:new Date().getFullYear()+1}) : '<div class="hint">Không cần đăng ký ngày ở vì nhà tự thuê / nhà cá nhân.</div>'}
    </div>

    <div class="card">
      <h2><span class="n">4</span> Ảnh chân dung & CCCD</h2>
      <p class="hint" style="margin-bottom:12px;">Hệ thống tự kiểm tra độ sáng, độ nét và bố cục ngay khi chụp hoặc tải ảnh lên. Nếu ảnh chưa đạt, hãy chụp lại theo gợi ý.</p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${photoBoxHtml('chandung')}
        ${photoBoxHtml('cccd_truoc')}
        ${photoBoxHtml('cccd_sau')}
      </div>
    </div>

    <div class="submitbar">
      <button class="btn btn-primary submitbtn" id="submitBtn" onclick="submitForm()">Gửi thông tin</button>
    </div>
  `;
  app.querySelectorAll('[data-f]').forEach(el=>{
    const handler = ()=>{
      state.fields[el.dataset.f] = el.value;
      if (el.dataset.f === 'quoctich' || el.dataset.f === 'mangktx') render();
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  app.querySelectorAll('[data-datef]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const id = el.dataset.datef, part = el.dataset.part;
      state.fields[id+'_'+part] = el.value;
      const d = state.fields[id+'_d'], m = state.fields[id+'_m'], y = state.fields[id+'_y'];
      state.fields[id] = (d && m && y) ? `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` : '';
    });
  });
}
render();
</script>
</body>
</html>
